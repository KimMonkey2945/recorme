# 로컬 개발용 PostgreSQL 16
# 기동: docker compose up -d   (backend/ 디렉터리에서)
# application-local.yml 기본값(record/record/record, 5432)과 일치한다.
services:
  postgres:
    image: postgres:16-alpine
    container_name: record-postgres
    environment:
      POSTGRES_DB: record
      POSTGRES_USER: record
      POSTGRES_PASSWORD: record
    ports:
      - "5432:5432"
    volumes:
      - record_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U record -d record"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  record_pgdata:
