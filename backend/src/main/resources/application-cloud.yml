# ===== 배포(클라우드) 프로파일 — 별도 관리형/자체호스팅 PostgreSQL =====
# 인프라 방침: 앱 데이터는 Supabase와 무관한 "별도 PostgreSQL"에 저장한다.
#   - Supabase는 Auth(소셜 검증·세션·JWT 발급) 전용. 데이터 저장에 사용하지 않는다.
#   - PostgREST/RLS/Edge Functions/profiles 미사용, 스키마 진실원은 Flyway 단일.
#
# 모든 값은 환경변수/시크릿으로 주입한다(코드·git에 평문 금지).
#
# 데이터 DB(런타임 + Flyway 동일 datasource 사용, 별도 포트 분리 불필요):
#   예) jdbc:postgresql://<db-host>:5432/recorme
#   - 백엔드와 DB는 같은 리전에 배치한다(요청마다 왕복하는 경로).
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
  # Flyway는 위 datasource를 그대로 사용한다(별도 주입이 필요하면 아래 환경변수로 분리 가능).
  flyway:
    url: ${FLYWAY_DB_URL:${DB_URL}}
    user: ${FLYWAY_DB_USER:${DB_USER}}
    password: ${FLYWAY_DB_PASSWORD:${DB_PASSWORD}}

# ===== Supabase Auth (ES256/JWKS 검증 전용) =====
# 백엔드는 Supabase가 ES256로 서명한 access token을 JWKS로 검증만 한다(자체 발급 없음).
# JWKS endpoint = url + /auth/v1/.well-known/jwks.json.
supabase:
  url: ${SUPABASE_URL}
