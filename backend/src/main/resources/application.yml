# ===== 공통 설정 (모든 프로파일 공유) =====
# datasource는 프로파일별 파일에서 정의한다(application-local.yml / application-cloud.yml).
spring:
  application:
    name: record
  profiles:
    # 기본 프로파일은 local. 배포 시 SPRING_PROFILES_ACTIVE=cloud 로 전환.
    active: ${SPRING_PROFILES_ACTIVE:local}
  flyway:
    enabled: true
    # 운영 안전: clean 비활성화. 모든 스키마 변경은 신규 버전 마이그레이션으로만.
    clean-disabled: true
    locations: classpath:db/migration
  # 업로드 한도. 초과 시 GlobalExceptionHandler가 FILE_TOO_LARGE(413)로 변환.
  # max-request-size 는 일기 다중 사진 업로드(최대 5장 × 5MB + 멀티파트 오버헤드 여유)를 수용한다.
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 26MB

# MyBatis: snake_case 컬럼 → camelCase 프로퍼티 자동 매핑
mybatis:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.recordapp

# REST API 기본 경로 (/api/v1)
server:
  servlet:
    context-path: /api/v1

# ===== 파일 스토리지 (프로필 이미지 등) =====
# 파일 바이너리는 로컬 디스크 root에 저장하고 DB에는 url-path 기준 상대 경로만 보관한다.
# 정적 서빙은 WebMvcConfig가 {url-path}/** → root로 매핑(실제 URL은 컨텍스트 경로 포함 /api/v1/files/...).
# ⚠️ 배포 시 root는 영속 볼륨 경로로 주입하거나 S3 구현으로 교체할 것(컨테이너 ephemeral).
record:
  storage:
    root: ${STORAGE_ROOT:./var/storage}
    url-path: /files
  # ===== 멀티모달 LLM(감정 분석) =====
  # provider=gemini(기본): Google generativelanguage API로 감정 분석. LLM_API_KEY 필수.
  #   api-key가 비어 있으면 LlmConfig가 자동으로 Stub를 선택(무키 로컬/CI 동작 보장).
  #   ⚠️ 개인 일기 본문·첨부 이미지가 외부(Google)로 전송된다(로컬 Ollama와 달리 외부 전송).
  # 로컬에서 실제 분석하려면: ① LLM_API_KEY 주입(gemini) 또는 ② LLM_PROVIDER=ollama(로컬·무키·과금 0).
  #   provider=ollama는 키 불필요(키 검사 전에 분기). Ollama 서버가 떠 있어야 실제 호출 가능
  #   (미기동이어도 빈 생성·기동은 됨, 호출 시에만 연결).
  #   키는 환경변수(LLM_API_KEY)로만 주입한다(코드·git 평문 금지).
  # ⚠️ 모델 선택: gemini-2.0-flash 계열은 무료 등급이 막혀(429) 유료 키에서만 동작.
  #   gemini-2.5 계열(flash-lite 포함)은 thinking이 켜지면 그 토큰이 max-tokens를 잠식해
  #   출력(JSON)이 뒤에서 잘려 파싱 실패→NEUTRAL 폴백(빈 코멘트)이 난다. 이를 막기 위해
  #   ① max-tokens를 넉넉히(1024) 잡고 ② GeminiLlmClient가 thinkingBudget=0으로 thinking을 끈다.
  llm:
    provider: ${LLM_PROVIDER:gemini}
    api-key: ${LLM_API_KEY:}
    base-url: ${LLM_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
    model: ${LLM_MODEL:gemini-2.5-flash-lite}
    ollama-base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    ollama-timeout-ms: 300000
    max-tokens: 1024
    max-images: 3
    image-max-edge-px: 512
    mode: ${LLM_MODE:immediate}
    timeout-ms: 30000
    max-retries: 2
  # ===== 감정 분석 백스톱 폴러 =====
  # 즉시 경로(일기 커밋 후 @Async 트리거) 유실·재시작·다중 인스턴스 보강용.
  # poll-interval-ms: fixedDelay(이전 실행 종료 후 간격), initial-delay-ms: 기동 후 첫 실행 지연,
  # batch-size: 1회 폴링당 선점(FOR UPDATE SKIP LOCKED)·dispatch 할 PENDING 최대 건수.
  analysis:
    poll-interval-ms: ${ANALYSIS_POLL_INTERVAL_MS:60000}
    initial-delay-ms: ${ANALYSIS_INITIAL_DELAY_MS:30000}
    batch-size: ${ANALYSIS_BATCH_SIZE:20}
  # ===== 서버 푸시(FCM) =====
  # firebase-credentials: 서비스 계정 JSON 파일 경로 또는 Base64 인코딩된 JSON 문자열.
  #   비어 있으면 PushConfig가 자동으로 StubPushService를 선택(무키 로컬/CI 동작 보장, 실제 발송 없음).
  #   자격증명은 환경변수(FCM_CREDENTIALS)로만 주입한다(코드·git 평문 금지).
  push:
    firebase-credentials: ${FCM_CREDENTIALS:}
  # ===== 작심삼일 스케줄러(자정 실패 배치 / 오늘 리마인더) =====
  # 모든 날짜·시각 판정은 애플리케이션이 KST(Asia/Seoul)로 주입하며, cron 도 zone=Asia/Seoul 로 구동된다.
  # failure-cron: 자정 직후 실패 배치(기본 매일 00:05). 초과 미완료 체크를 MISSED·결심을 FAILED 로 전이.
  # reminder-cron: 오늘 리마인더(기본 15분마다). reminder_time 도래 시 하루 1회 발송(reminded_on 멱등).
  # batch-size: 드레인 루프 1회 선점(FOR UPDATE SKIP LOCKED) 최대 건수(두 스케줄러 공용).
  # failure-notify: true 면 FAILED 전이된 결심 사용자에게 실패 알림 푸시(@Async).
  resolution:
    failure-cron: "${RESOLUTION_FAILURE_CRON:0 5 0 * * *}"
    reminder-cron: "${RESOLUTION_REMINDER_CRON:0 */15 * * * *}"
    batch-size: ${RESOLUTION_BATCH_SIZE:100}
    failure-notify: ${RESOLUTION_FAILURE_NOTIFY:true}

# ===== Supabase Auth (ES256/JWKS 검증 전용) =====
# 백엔드는 자체 JWT를 발급하지 않고 Supabase가 ES256로 서명한 access token을 JWKS로 검증만 한다.
# JWKS endpoint = url + /auth/v1/.well-known/jwks.json (NimbusJwtDecoder가 lazy fetch·캐싱·키회전).
# url은 환경변수로 주입. 프로파일(local/test/cloud)이 항상 override 한다.
supabase:
  url: ${SUPABASE_URL:}
