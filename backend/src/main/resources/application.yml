# ===== кіөнҶө м„Өм • (лӘЁл“  н”„лЎңнҢҢмқј кіөмң ) =====
# datasourceлҠ” н”„лЎңнҢҢмқјлі„ нҢҢмқјм—җм„ң м •мқҳн•ңлӢӨ(application-local.yml / application-cloud.yml).
spring:
  application:
    name: record
  profiles:
    # кё°ліё н”„лЎңнҢҢмқјмқҖ local. л°°нҸ¬ мӢң SPRING_PROFILES_ACTIVE=cloud лЎң м „нҷҳ.
    active: ${SPRING_PROFILES_ACTIVE:local}
  flyway:
    enabled: true
    # мҡҙмҳҒ м•Ҳм „: clean л№„нҷңм„ұнҷ”. лӘЁл“  мҠӨнӮӨл§Ҳ ліҖкІҪмқҖ мӢ к·ң лІ„м „ л§Ҳмқҙк·ёл Ҳмқҙм…ҳмңјлЎңл§Ң.
    clean-disabled: true
    locations: classpath:db/migration

# MyBatis: snake_case м»¬лҹј вҶ’ camelCase н”„лЎңнҚјнӢ° мһҗлҸҷ л§Өн•‘
mybatis:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.recordapp

# REST API кё°ліё кІҪлЎң (/api/v1)
server:
  servlet:
    context-path: /api/v1

# м• н”ҢлҰ¬мјҖмқҙм…ҳ кі мң  м„Өм •
record:
  jwt:
    # мӢңнҒ¬лҰҝмқҖ нҷҳкІҪліҖмҲҳ/мӢңнҒ¬лҰҝмңјлЎң мЈјмһ…(мҪ”л“ңВ·git нҸүл¬ё кёҲм§Җ). local/test н”„лЎңнҢҢмқјмқҖ мһҗмІҙ dev кё°ліёк°’ м ңкіө.
    secret: ${JWT_SECRET}
    access-expiration-ms: ${JWT_ACCESS_EXP_MS:1800000}      # 30л¶„
    refresh-expiration-ms: ${JWT_REFRESH_EXP_MS:1209600000} # 14мқј
