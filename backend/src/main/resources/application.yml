# ===== кіөнҶө м„Өм • (лӘЁл“  н”„лЎңнҢҢмқј кіөмң ) =====
# datasourceлҠ” н”„лЎңнҢҢмқјлі„ нҢҢмқјм—җм„ң м •мқҳн•ңлӢӨ(application-local.yml / application-cloud.yml).
spring:
  application:
    name: record
  profiles:
    # кё°ліё н”„лЎңнҢҢмқјмқҖ local. л°°нҸ¬ мӢң SPRING_PROFILES_ACTIVE=cloud лЎң м „нҷҳ.
    active: ${SPRING_PROFILES_ACTIVE:local}
  flyway:
    enabled: true
    # мҡҙмҳҒ м•Ҳм „: clean л№„нҷңм„ұнҷ”. лӘЁл“  мҠӨнӮӨл§Ҳ ліҖкІҪмқҖ мӢ к·ң лІ„м „ л§Ҳмқҙк·ёл Ҳмқҙм…ҳмңјлЎңл§Ң.
    clean-disabled: true
    locations: classpath:db/migration

# MyBatis: snake_case м»¬лҹј вҶ’ camelCase н”„лЎңнҚјнӢ° мһҗлҸҷ л§Өн•‘
mybatis:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.recordapp

# REST API кё°ліё кІҪлЎң (/api/v1)
server:
  servlet:
    context-path: /api/v1

# ===== Supabase Auth (ES256/JWKS кІҖмҰқ м „мҡ©) =====
# л°ұм—”л“ңлҠ” мһҗмІҙ JWTлҘј л°ңкёүн•ҳм§Җ м•Ҡкі  Supabaseк°Җ ES256лЎң м„ңлӘ…н•ң access tokenмқ„ JWKSлЎң кІҖмҰқл§Ң н•ңлӢӨ.
# JWKS endpoint = url + /auth/v1/.well-known/jwks.json (NimbusJwtDecoderк°Җ lazy fetchВ·мәҗмӢұВ·нӮӨнҡҢм „).
# urlмқҖ нҷҳкІҪліҖмҲҳлЎң мЈјмһ…. н”„лЎңнҢҢмқј(local/test/cloud)мқҙ н•ӯмғҒ override н•ңлӢӨ.
supabase:
  url: ${SUPABASE_URL:}
