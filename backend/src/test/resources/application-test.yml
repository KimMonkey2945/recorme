# ===== 테스트 프로파일 =====
# datasource는 @ServiceConnection(Testcontainers)으로 주입되므로 정의하지 않는다.
# Supabase url은 구문상 유효한 더미 https(NimbusJwtDecoder build()는 URL 파싱만, fetch는 lazy
# → 컨텍스트 로드·기동에 네트워크 불필요). 검증기 단위 테스트는 인메모리 EC 키로 decoder를 주입한다.
supabase:
  url: https://test.supabase.invalid

# 작심삼일 스케줄러(@Scheduled)는 통합 테스트가 배치 메서드를 직접 호출해 결정론적으로 검증하므로,
# 백그라운드 자동 구동을 끈다. Spring 의 CRON_DISABLED 마커("-")를 주입하면 해당 @Scheduled 가 등록되지 않는다
# (리마인더 15분 주기 배치가 테스트 데이터와 경합해 비결정성을 유발하는 것을 차단).
record:
  # 감정 분석 flag(Task 024): 테스트 기본은 on 으로 고정한다.
  # 운영 기본값은 false(감정 사용자 직접 입력)지만, 기존 통합 테스트(확정→PENDING→분석)의
  # 회귀를 보존하려면 테스트에서는 분석 경로가 살아 있어야 한다. off 경로(즉시 DONE·빈 미등록)는
  # ManualEmotionTest 가 @TestPropertySource(record.analysis.enabled=false)로 별도 컨텍스트에서 검증한다.
  analysis:
    enabled: true
  resolution:
    failure-cron: "-"
    reminder-cron: "-"
