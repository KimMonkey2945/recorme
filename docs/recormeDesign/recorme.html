<style>
  :root {
    --bg-paper: #FBF8F2;
    --font-display: 'Nanum Myeongjo', 'Gowun Batang', Georgia, serif;
    --font-serene: 'Gowun Batang', 'Nanum Myeongjo', Georgia, serif;
    --font-cute: 'Fredoka', 'Gaegu', system-ui, sans-serif;
    --rc-ink: #2A2622;
    --rc-violet: #6541F2;
    --rc-blue: #3366FF;
  }
  html, body { margin: 0; height: 100%; }
  body {
    background: #e7e8ec; font-family: var(--font-sans);
    display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; box-sizing: border-box;
  }
  #root { display: flex; }
  .rc-app {
    position: relative; width: 404px; height: min(880px, calc(100vh - 48px));
    display: flex; flex-direction: column; overflow: hidden;
    background: var(--bg-normal); border-radius: 28px;
    box-shadow: 0 30px 70px rgba(23,23,25,0.18); border: 1px solid rgba(23,23,25,0.06);
  }
  .rc-screen { flex: 1; min-height: 0; overflow-y: auto; position: relative; }
  .rc-screen::-webkit-scrollbar { width: 0; }
  .rc-nav { flex-shrink: 0; border-top: 1px solid var(--line-alternative); background: var(--bg-normal); }

  textarea::placeholder { color: var(--text-assistive); }
  button { font-family: var(--font-sans); }

  @keyframes rcFade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes rcPop { from { opacity: 0; transform: scale(.92); } to { opacity: 1; transform: scale(1); } }
  @keyframes rcToast { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes rcSpin { to { transform: rotate(360deg); } }
  .rc-spin { animation: rcSpin 2.4s linear infinite; }

  /* login fly-in choreography */
  @keyframes rcDrop {
    0%   { transform: translateY(-260px) rotate(-28deg) scale(.6); opacity: 0; }
    62%  { transform: translateY(14px) rotate(6deg) scale(1.04); opacity: 1; }
    80%  { transform: translateY(-6px) rotate(-2deg) scale(.99); }
    100% { transform: none; opacity: 1; }
  }
  @keyframes rcZip {
    0%   { transform: translate(var(--zx,-120px), var(--zy,-60px)) scale(0); opacity: 0; }
    70%  { opacity: 1; }
    100% { transform: none; scale: 1; opacity: 1; }
  }
  @keyframes rcRise { 0% { transform: translateY(18px); opacity: 0; } 100% { transform: none; opacity: 1; } }
  @keyframes rcFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }
  @keyframes rcBlob { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(14px,-18px) scale(1.08); } }
  .rc-fly-emblem { animation: rcDrop 1s cubic-bezier(.34,1.4,.5,1); }
  .rc-fly-spark  { animation: rcZip .7s cubic-bezier(.2,.9,.3,1.4); }
  .rc-rise       { animation: rcRise .6s ease; }

  /* red-panda: \uac78\uc5b4\uc640\uc11c \u2192 \uc77c\uc5b4\uc11c\uba70 \ub450 \ud314 \ubc88\uc801 \u2192 \uc704\ud611 \uc2a4\uc6e8\uc774 */
  .rc-panda, .rc-sway, .rc-armL, .rc-armR, .rc-legL, .rc-legR { transform-box: view-box; }
  @keyframes walkIn {
    0%   { transform: translate(-220px, 0); }
    14%  { transform: translate(-168px,-3px); }
    28%  { transform: translate(-116px, 0); }
    42%  { transform: translate(-64px,-3px); }
    52%  { transform: translate(-16px, 0); }
    56%  { transform: translate(0,-3px); }
    64%  { transform: translate(0,4px)  scaleY(.95); }
    76%  { transform: translate(0,-4px) scaleY(1.06); }
    90%  { transform: translate(0,1px); }
    100% { transform: none; }
  }
  .rc-panda { transform-origin: 100px 207px; animation: walkIn 2.5s cubic-bezier(.42,.55,.5,1); }
  @keyframes stepL { 0%{transform:rotate(-20deg)} 7%{transform:translateY(-4px) rotate(2deg)} 14%{transform:rotate(20deg)} 21%{transform:translateY(-4px) rotate(-2deg)} 28%{transform:rotate(-20deg)} 35%{transform:translateY(-4px) rotate(2deg)} 42%{transform:rotate(20deg)} 49%{transform:translateY(-4px) rotate(-2deg)} 55%{transform:rotate(8deg)} 62%{transform:none} 100%{transform:none} }
  @keyframes stepR { 0%{transform:rotate(20deg)} 7%{transform:translateY(-4px) rotate(-2deg)} 14%{transform:rotate(-20deg)} 21%{transform:translateY(-4px) rotate(2deg)} 28%{transform:rotate(20deg)} 35%{transform:translateY(-4px) rotate(-2deg)} 42%{transform:rotate(-20deg)} 49%{transform:translateY(-4px) rotate(2deg)} 55%{transform:rotate(-8deg)} 62%{transform:none} 100%{transform:none} }
  .rc-legL { transform-origin: 86px 174px;  animation: stepL 2.5s ease-in-out; }
  .rc-legR { transform-origin: 114px 174px; animation: stepR 2.5s ease-in-out; }
  @keyframes armUpL { 0%{transform:rotate(78deg)} 54%{transform:rotate(78deg)} 74%{transform:rotate(-13deg)} 88%{transform:rotate(5deg)} 100%{transform:none} }
  @keyframes armUpR { 0%{transform:rotate(-78deg)} 54%{transform:rotate(-78deg)} 74%{transform:rotate(13deg)} 88%{transform:rotate(-5deg)} 100%{transform:none} }
  .rc-armL { transform-origin: 74px 130px;  animation: armUpL 2.5s cubic-bezier(.34,.7,.4,1); }
  .rc-armR { transform-origin: 126px 130px; animation: armUpR 2.5s cubic-bezier(.34,.7,.4,1); }

  @keyframes rcSway { 0%,100%{transform:rotate(-3deg)} 50%{transform:rotate(3deg)} }
  .rc-sway { transform-origin: 100px 200px; animation: rcSway 1.4s ease-in-out 2.45s infinite; }

  @keyframes rcHehe { 0% { transform: scale(0) rotate(-12deg); opacity:0; } 60% { opacity:1; } 78% { transform: scale(1.18) rotate(3deg); } 100% { transform: none; opacity:1; } }
  .rc-hehe { animation: rcHehe .5s cubic-bezier(.3,1.3,.5,1) 2.05s; }

  /* resting red-panda portrait — gentle breathing + soft entrance */
  .rc-rest { animation: rcRise .7s ease; }
  @keyframes rcBreathe { 0%,100%{transform:scaleY(1) translateY(0)} 50%{transform:scaleY(1.02) translateY(-1.5px)} }
  .rc-breathe { transform-box: view-box; transform-origin: 115px 180px; animation: rcBreathe 3.8s ease-in-out infinite; }

  /* mascot image — gentle side-to-side sway in place */
  @keyframes mascotSway {
    0%   { transform: rotate(-3.5deg) translateY(0); }
    50%  { transform: rotate(3.5deg) translateY(-4px); }
    100% { transform: rotate(-3.5deg) translateY(0); }
  }
  .rc-mascot { transform-origin: 50% 94%; animation: mascotSway 2.1s ease-in-out infinite; }
  @keyframes mascotShadow { 0%,100% { transform: scaleX(1); opacity: .2; } 50% { transform: scaleX(.9); opacity: .14; } }
  .rc-mshadow { animation: mascotShadow 2.1s ease-in-out infinite; }
  .rc-float      { animation: rcFloat 3.4s ease-in-out infinite; }

  /* screen transition — never hide content; animate transform only */
  .rc-screen > * { opacity: 1; }
  @media (prefers-reduced-motion: no-preference) {
    .rc-screen > * { animation: rcEnter .26s cubic-bezier(.2,.7,.3,1); }
  }
  @keyframes rcEnter { from { transform: translateY(8px); } to { transform: none; } }
</style>
